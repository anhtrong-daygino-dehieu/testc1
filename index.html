<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB1VGuNjxmLSmlLgno057xFlpnZcHdoUDs",
  authDomain: "gino1khachsan.firebaseapp.com",
  projectId: "gino1khachsan",
  storageBucket: "gino1khachsan.firebasestorage.app",
  messagingSenderId: "895972012959",
  appId: "1:895972012959:web:7251dd3fbbb25d453ac3aa",
  measurementId: "G-CTN2S83XYR"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Xử lý form đăng nhập
  window.login = function() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    signInWithEmailAndPassword(auth, email, password)
      .catch((error) => {
        document.getElementById("error-msg").innerText = "Sai email hoặc mật khẩu!";
      });
  };

  window.logout = function() {
    signOut(auth);
  };

  // Kiểm tra trạng thái đăng nhập
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("quiz-content").style.display = "block";
    } else {
      document.getElementById("login-screen").style.display = "block";
      document.getElementById("quiz-content").style.display = "none";
    }
  });
</script>

<!-- Màn hình đăng nhập -->
<div id="login-screen">

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mật khẩu">
  <button onclick="login()">Đăng nhập</button>
  <p id="error-msg" style="color:red;"></p>
</div>

<!-- Nội dung quiz -->

</div>
<!DOCTYPE html>
<html lang="vi">
<head>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Quicksand',sans-serif;background:#f0f4f0}

.header-brand{font-size:11px;color:#adc;margin-top:4px;opacity:.8}

/* ── SCREENS ── */
.screen{display:none;min-height:calc(100vh - 60px);padding:20px}
.screen.active{display:block}

/* ── NAME SCREEN ── */
.name-card{max-width:480px;margin:60px auto;background:#fff;border-radius:20px;padding:40px 32px;box-shadow:0 8px 32px rgba(0,0,0,.12);text-align:center}
.name-card .icon{font-size:52px;margin-bottom:16px}
.name-card h2{font-size:22px;color:#1a3a17;margin-bottom:6px}

.name-input{width:100%;padding:14px 16px;border:2px solid #ddd;border-radius:10px;font-size:16px;font-family:'Quicksand',sans-serif;outline:none;transition:.2s}

.btn-start{margin-top:16px;width:100%;padding:14px;background:linear-gradient(135deg,#2e6b28,#4a9a3e);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;font-family:'Quicksand',sans-serif;cursor:pointer;transition:.2s}
.btn-start:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(46,107,40,.4)}

/* ── QUIZ SCREEN ── */
.quiz-container{max-width:680px;margin:0 auto}
.quiz-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.student-badge{background:#fff;border:2px solid #c8e6b8;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;color:#1a3a17}
.progress-info{font-size:13px;color:#555;font-weight:600}
.progress-bar-wrap{background:#e0e0e0;border-radius:4px;height:6px;margin-bottom:20px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#2e6b28,#7ab648);border-radius:4px;transition:width .4s}

.q-card{background:#fff;border-radius:16px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:16px}

.q-jp{font-family:'BIZ UDPGothic',sans-serif;font-size:17px;font-weight:700;color:#111;line-height:1.8;margin-bottom:6px}
.q-vi{font-size:13px;color:#1B4F72;font-style:italic;margin-bottom:18px;padding:8px 12px;background:#e8f4fe;border-radius:8px}

.opts{display:flex;flex-direction:column;gap:10px}
.opt-btn{padding:13px 16px;border:2px solid #ddd;background:#fafafa;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;font-family:'Quicksand',sans-serif;text-align:left;transition:.15s;line-height:1.5}
.opt-btn:hover:not(:disabled){border-color:#2e6b28;background:#f0f8ea}

.opt-btn.wrong{background:#f8d7da;border-color:#dc3545;color:#721c24}
.opt-btn:disabled{cursor:default}
.opt-label{font-weight:800;margin-right:8px;color:#2e6b28}
.opt-btn.correct .opt-label{color:#145214}
.opt-btn.wrong .opt-label{color:#721c24}

/* answer box */
.answer-box{background:#f8fbf7;border:1.5px solid #c8e6b8;border-radius:12px;padding:16px;margin-top:14px;display:none}
.answer-box.show{display:block}
.answer-result{font-size:15px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.answer-result.ok{color:#1a7a30}
.answer-result.ng{color:#c0392b}

.vocab-read{color:#888;font-size:11px;display:block}
.vocab-vi{color:#1B4F72;font-size:12px;font-weight:600}

.review-badge.ng{background:#f8d7da;color:#721c24}

// ── STATE ──
let studentName='', current=0, answers=Array(20).fill(null);

function startQuiz(){
  studentName=document.getElementById('studentName').value.trim();
  if(!studentName)return;
  document.getElementById('nameDisplay').textContent=studentName;
  showScreen('screen-quiz');
  renderQ(0);
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function renderQ(i){
  current=i;
  const q=QS[i], answered=answers[i]!==null;
  document.getElementById('qCurrent').textContent=i+1;
  document.getElementById('progressFill').style.width=((i+1)/20*100)+'%';

  let optsHtml=q.o.map((opt,oi)=>{
    let cls='opt-btn';
    if(answered){
      if(oi===q.a) cls+=' correct';
      else if(oi===answers[i]&&oi!==q.a) cls+=' wrong';
    }
    return `<button class="${cls}" onclick="selectOpt(${oi})" ${answered?'disabled':''}>
      <span class="opt-label">${['A','B','C'][oi]}.</span>${opt}<br>
      <small style="color:#888;font-size:11px;font-style:italic">${q.ov[oi]}</small>
    </button>`;
  }).join('');

  let ansHtml='';
  if(answered){
    const ok=answers[i]===q.a;
    ansHtml=`<div class="answer-box show">
      <div class="answer-result ${ok?'ok':'ng'}">${ok?'✅ Chính xác!':'❌ Chưa đúng rồi!'}
        ${!ok?`<span style="font-size:13px;font-weight:600">Đáp án đúng: <b>${['A','B','C'][q.a]}. ${q.o[q.a]}</b></span>`:''}
      </div>
      <div class="exp-title">📖 Giải thích (tiếng Nhật)</div>
      <div class="exp-jp">${q.ej}</div>
      <div class="exp-title">🇻🇳 Giải thích (tiếng Việt)</div>
      <div class="exp-vi">${q.ev}</div>
      <div class="exp-title">📚 Từ vựng</div>
      <div class="vocab-wrap">${q.vc.map(([jp,r,vi])=>`
        <div class="vocab-chip">
          <span class="vocab-jp">${jp}</span>
          <span class="vocab-read">${r}</span>
          <span class="vocab-vi">${vi}</span>
        </div>`).join('')}</div>
    </div>`;
  }

  document.getElementById('qCard').innerHTML=`
    <div class="q-num">Câu ${i+1} / 20</div>
    <div class="q-jp">${q.q}</div>
    <div class="q-vi">${q.qv}</div>
    <div class="opts">${optsHtml}</div>
    ${ansHtml}`;

  document.getElementById('btnPrev').disabled=i===0;
  document.getElementById('btnNext').textContent=i===19?'Câu cuối ▶':'Tiếp ▶';
  document.getElementById('btnNext').disabled=i===19;

  // Show nút nộp bài nếu đã trả lời đủ
  const done=answers.filter(a=>a!==null).length;
  document.getElementById('btnFinish').style.display=done===20?'block':'none';
}

function selectOpt(oi){
  if(answers[current]!==null)return;
  answers[current]=oi;
  renderQ(current);
}

function navigate(dir){
  const next=current+dir;
  if(next>=0&&next<20)renderQ(next);
}

function finishQuiz(){
  const score=answers.reduce((s,a,i)=>s+(a===QS[i].a?1:0),0);
  const pct=Math.round(score/20*100);
  let msg,stars;
  if(pct>=90){msg='🎉 Xuất sắc! Bạn nắm vững kiến thức rồi!';stars='⭐⭐⭐⭐⭐';}
  else if(pct>=80){msg='👍 Rất tốt! Ôn thêm một chút là hoàn hảo!';stars='⭐⭐⭐⭐';}
  else if(pct>=60){msg='📚 Khá! Cần ôn lại những câu sai nhé!';stars='⭐⭐⭐';}
  else if(pct>=40){msg='💪 Cố lên! Học lại và làm thử lần nữa nào!';stars='⭐⭐';}
  else{msg='🌱 Hãy ôn kỹ lại từ đầu nhé bạn ơi!';stars='⭐';}

  document.getElementById('resultName').textContent='👤 '+studentName;
  document.getElementById('resultScore').textContent=score;
  document.getElementById('resultPct').textContent=pct+'% chính xác';
  document.getElementById('resultMsg').textContent=msg;
  document.getElementById('resultStars').textContent=stars;

  // Review list
  let html='';
  QS.forEach((q,i)=>{
    const ok=answers[i]===q.a;
    html+=`<div class="review-item ${ok?'ok':'ng'}">
      <div class="review-header">
        <span class="review-badge ${ok?'ok':'ng'}">${ok?'✅ Đúng':'❌ Sai'}</span>
        <span style="font-size:12px;color:#888">Câu ${i+1}</span>
      </div>
      <div class="review-q">${q.q}</div>
      <div class="review-q-vi">${q.qv}</div>
      ${!ok?`<div class="review-your">Bạn chọn: ${answers[i]!==null?['A','B','C'][answers[i]]+'. '+q.o[answers[i]]:'(chưa trả lời)'}</div>`:''}
      <div class="review-correct ${ok?'ok':''}">✅ Đáp án đúng: ${['A','B','C'][q.a]}. ${q.o[q.a]} — ${q.ov[q.a]}</div>
      <div class="exp-vi" style="margin-top:6px">${q.ev}</div>
      <div class="vocab-wrap" style="margin-top:8px">${q.vc.map(([jp,r,vi])=>`
        <div class="vocab-chip">
          <span class="vocab-jp">${jp}</span>
          <span class="vocab-read">${r}</span>
          <span class="vocab-vi">${vi}</span>
        </div>`).join('')}</div>
    </div>`;
  });
  document.getElementById('reviewList').innerHTML=html;
  showScreen('screen-result');
}

function retryQuiz(){
  answers=Array(20).fill(null);
  current=0;
  showScreen('screen-quiz');
  renderQ(0);
}
</script>
